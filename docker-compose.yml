services:
  relay:
    build: .
    container_name: home-relay
    environment:
      - SECRET_KEY=replace-with-random-secret
      - DEFAULT_DOMAIN=relay.local
      - SMTP_HOST=0.0.0.0
      - SMTP_PORT=2525
      - MX_TARGET_HOST=
      - PUBLIC_SMTP_PORT=25
      - DATABASE_URL=sqlite:////app/app/data/app.db
    ports:
      - "8080:8080"
      - "2525:2525"
    volumes:
      - ./app/data:/app/app/data
    restart: unless-stopped
